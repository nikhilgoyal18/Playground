<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search News & Twitter</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: #f5f5f5;
            color: #333;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .header {
            background: white;
            border-bottom: 1px solid #e0e0e0;
            padding: 16px 20px;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.05);
        }

        .header h1 {
            font-size: 18px;
            font-weight: 600;
        }

        .header p {
            font-size: 13px;
            color: #666;
            margin-top: 4px;
        }

        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .chat-container::-webkit-scrollbar {
            width: 6px;
        }

        .chat-container::-webkit-scrollbar-track {
            background: transparent;
        }

        .chat-container::-webkit-scrollbar-thumb {
            background: #ccc;
            border-radius: 3px;
        }

        .message {
            display: flex;
            gap: 8px;
            animation: fadeIn 0.3s ease-in;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(4px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user {
            justify-content: flex-end;
        }

        .message.assistant {
            justify-content: flex-start;
        }

        .message-bubble {
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 8px;
            line-height: 1.5;
            word-wrap: break-word;
            white-space: pre-wrap;
        }

        .message.user .message-bubble {
            background: #2563eb;
            color: white;
        }

        .message.assistant .message-bubble {
            background: white;
            border: 1px solid #e0e0e0;
        }

        .sources-list {
            margin-top: 8px;
            font-size: 13px;
            color: #666;
        }

        .sources-list .source {
            margin-top: 4px;
            padding: 6px 8px;
            background: #f9f9f9;
            border-left: 2px solid #2563eb;
            border-radius: 2px;
        }

        .sources-list .source-title {
            font-weight: 500;
        }

        .sources-list .source-meta {
            font-size: 12px;
            color: #999;
            margin-top: 2px;
        }

        .log-footer {
            margin-top: 8px;
            padding-top: 8px;
            border-top: 1px solid #e0e0e0;
        }

        .log-toggle {
            cursor: pointer;
            color: #2563eb;
            font-size: 12px;
            font-weight: 500;
            user-select: none;
            display: inline-block;
        }

        .log-toggle:hover {
            text-decoration: underline;
        }

        .log-toggle.expanded::before {
            content: "▾ ";
        }

        .log-toggle.collapsed::before {
            content: "▸ ";
        }

        .log-details {
            margin-top: 8px;
            font-size: 12px;
            color: #666;
            display: none;
        }

        .log-details.visible {
            display: block;
        }

        .log-row {
            display: grid;
            grid-template-columns: 140px 1fr;
            gap: 8px;
            padding: 4px 0;
        }

        .log-label {
            color: #999;
            font-weight: 500;
        }

        .log-value {
            color: #333;
            font-family: "Monaco", "Menlo", monospace;
        }

        .search-id {
            display: inline-block;
            background: #f0f0f0;
            padding: 2px 6px;
            border-radius: 3px;
            cursor: pointer;
            font-weight: 600;
            transition: background 0.2s;
        }

        .search-id:hover {
            background: #e0e0e0;
        }

        .search-id.copied {
            background: #d4edda;
        }

        .input-area {
            background: white;
            border-top: 1px solid #e0e0e0;
            padding: 16px 20px;
            display: flex;
            gap: 8px;
        }

        .input-wrapper {
            display: flex;
            gap: 8px;
            flex: 1;
        }

        .input-wrapper input {
            flex: 1;
            border: 1px solid #d0d0d0;
            border-radius: 6px;
            padding: 10px 12px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
        }

        .input-wrapper input:focus {
            border-color: #2563eb;
        }

        .filter-select {
            border: 1px solid #d0d0d0;
            border-radius: 6px;
            padding: 10px 12px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
            background: white;
            cursor: pointer;
        }

        .filter-select:focus {
            border-color: #2563eb;
        }

        button {
            background: #2563eb;
            color: white;
            border: none;
            border-radius: 6px;
            padding: 10px 16px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s;
        }

        button:hover {
            background: #1d4ed8;
        }

        button:active {
            background: #1e40af;
        }

        button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .thinking {
            font-style: italic;
            color: #999;
        }

        .error-message {
            color: #dc2626;
            background: #fee;
            padding: 12px 16px;
            border-radius: 6px;
            font-size: 14px;
        }

        .empty-state {
            text-align: center;
            color: #999;
            padding: 40px 20px;
        }

        .empty-state h2 {
            font-size: 16px;
            margin-bottom: 8px;
        }

        .empty-state p {
            font-size: 13px;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>Search News & Twitter</h1>
        <p>Semantic search across your newsletter and Twitter digests</p>
    </div>

    <div class="chat-container" id="chatContainer">
        <div class="empty-state">
            <h2>Start Searching</h2>
            <p>Ask me anything about your newsletters and Twitter feed</p>
        </div>
    </div>

    <div class="input-area">
        <select class="filter-select" id="sourceFilter">
            <option value="">All sources</option>
            <option value="newsletter">Newsletter only</option>
            <option value="twitter">Twitter only</option>
        </select>
        <div class="input-wrapper">
            <input
                type="text"
                id="queryInput"
                placeholder="Ask a question..."
                autocomplete="off"
            >
            <button id="sendBtn">Send</button>
        </div>
    </div>

    <script>
        const chatContainer = document.getElementById("chatContainer");
        const queryInput = document.getElementById("queryInput");
        const sendBtn = document.getElementById("sendBtn");
        const sourceFilter = document.getElementById("sourceFilter");

        let isLoading = false;

        // Clear empty state on first message
        function clearEmptyState() {
            const empty = chatContainer.querySelector(".empty-state");
            if (empty) empty.remove();
        }

        // Add a message to the chat
        function addMessage(content, isUser = false, metadata = null) {
            clearEmptyState();

            const messageDiv = document.createElement("div");
            messageDiv.className = `message ${isUser ? "user" : "assistant"}`;

            const bubble = document.createElement("div");
            bubble.className = "message-bubble";
            bubble.textContent = content;

            messageDiv.appendChild(bubble);

            // Add sources and log footer if assistant message with metadata
            if (!isUser && metadata) {
                if (metadata.sources && metadata.sources.length > 0) {
                    const sourcesList = document.createElement("div");
                    sourcesList.className = "sources-list";

                    metadata.sources.forEach((source, idx) => {
                        const sourceDiv = document.createElement("div");
                        sourceDiv.className = "source";
                        sourceDiv.innerHTML = `
                            <div class="source-title">[${idx + 1}] ${source.title || "Untitled"}</div>
                            <div class="source-meta">${source.source_type?.toUpperCase() || "UNKNOWN"} | ${source.date || "N/A"} | ${source.author || "Unknown"}</div>
                        `;
                        sourcesList.appendChild(sourceDiv);
                    });

                    messageDiv.appendChild(sourcesList);
                }

                // Add log footer
                const logFooter = document.createElement("div");
                logFooter.className = "log-footer";

                const logToggle = document.createElement("span");
                logToggle.className = "log-toggle collapsed";
                logToggle.textContent = "Show log";
                logToggle.style.cursor = "pointer";

                const logDetails = document.createElement("div");
                logDetails.className = "log-details";
                logDetails.innerHTML = `
                    <div class="log-row">
                        <div class="log-label">Search ID:</div>
                        <div class="log-value"><span class="search-id" data-search-id="${metadata.search_id}">${metadata.search_id}</span></div>
                    </div>
                    <div class="log-row">
                        <div class="log-label">Path:</div>
                        <div class="log-value">${metadata.path || "unknown"}</div>
                    </div>
                    <div class="log-row">
                        <div class="log-label">Tokens in:</div>
                        <div class="log-value">${metadata.tokens_in || 0}</div>
                    </div>
                    <div class="log-row">
                        <div class="log-label">Tokens out:</div>
                        <div class="log-value">${metadata.tokens_out || 0}</div>
                    </div>
                    <div class="log-row">
                        <div class="log-label">Total tokens:</div>
                        <div class="log-value">${(metadata.tokens_in || 0) + (metadata.tokens_out || 0)}</div>
                    </div>
                    <div class="log-row">
                        <div class="log-label">Duration:</div>
                        <div class="log-value">${metadata.duration_ms || 0}ms</div>
                    </div>
                    ${metadata.judge_score !== null && metadata.judge_score !== undefined ? `
                        <div class="log-row">
                            <div class="log-label">Judge score:</div>
                            <div class="log-value">${metadata.judge_score}/10</div>
                        </div>
                    ` : ''}
                    ${metadata.web_result_count > 0 ? `
                        <div class="log-row">
                            <div class="log-label">Web results:</div>
                            <div class="log-value">${metadata.web_result_count}</div>
                        </div>
                    ` : ''}
                `;

                logToggle.addEventListener("click", () => {
                    const isVisible = logDetails.classList.contains("visible");
                    if (isVisible) {
                        logDetails.classList.remove("visible");
                        logToggle.classList.remove("expanded");
                        logToggle.classList.add("collapsed");
                    } else {
                        logDetails.classList.add("visible");
                        logToggle.classList.remove("collapsed");
                        logToggle.classList.add("expanded");
                    }
                });

                // Add search-id copy handler
                const searchIdElements = logDetails.querySelectorAll(".search-id");
                searchIdElements.forEach(el => {
                    el.addEventListener("click", async (e) => {
                        const searchId = el.getAttribute("data-search-id");
                        try {
                            await navigator.clipboard.writeText(searchId);
                            el.classList.add("copied");
                            setTimeout(() => el.classList.remove("copied"), 2000);
                        } catch (err) {
                            console.error("Failed to copy:", err);
                        }
                    });
                });

                logFooter.appendChild(logToggle);
                logFooter.appendChild(logDetails);
                messageDiv.appendChild(logFooter);
            }

            chatContainer.appendChild(messageDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        // Send query
        async function sendQuery() {
            const query = queryInput.value.trim();
            if (!query || isLoading) return;

            // Add user message
            addMessage(query, true);
            queryInput.value = "";

            // Add thinking message
            const thinkingDiv = document.createElement("div");
            thinkingDiv.className = "message assistant";
            const thinkingBubble = document.createElement("div");
            thinkingBubble.className = "message-bubble thinking";
            thinkingBubble.textContent = "Thinking...";
            thinkingDiv.appendChild(thinkingBubble);
            thinkingDiv.id = "thinkingMessage";
            chatContainer.appendChild(thinkingDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;

            isLoading = true;
            sendBtn.disabled = true;
            queryInput.disabled = true;

            try {
                const response = await fetch("/search", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        query: query,
                        source: sourceFilter.value || null,
                        top_k: 5
                    })
                });

                const data = await response.json();

                // Remove thinking message
                const thinking = document.getElementById("thinkingMessage");
                if (thinking) thinking.remove();

                if (!response.ok) {
                    addMessage(`Error: ${data.error || "Unknown error"}`, false);
                } else {
                    addMessage(data.answer || "No answer generated", false, {
                        search_id: data.search_id,
                        sources: data.sources || [],
                        path: data.path,
                        tokens_in: data.tokens_in,
                        tokens_out: data.tokens_out,
                        duration_ms: data.duration_ms,
                        judge_score: data.judge_score,
                        web_result_count: data.web_result_count
                    });
                }
            } catch (err) {
                const thinking = document.getElementById("thinkingMessage");
                if (thinking) thinking.remove();
                addMessage(`Error: ${err.message}`, false);
            } finally {
                isLoading = false;
                sendBtn.disabled = false;
                queryInput.disabled = false;
                queryInput.focus();
            }
        }

        // Event listeners
        sendBtn.addEventListener("click", sendQuery);
        queryInput.addEventListener("keypress", (e) => {
            if (e.key === "Enter" && !e.shiftKey) {
                e.preventDefault();
                sendQuery();
            }
        });

        // Focus input on load
        queryInput.focus();
    </script>
</body>
</html>
